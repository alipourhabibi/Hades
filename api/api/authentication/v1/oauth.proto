// OAuth 2.0 provider integration for the Hades schema registry.
//
// Supports linking GitHub and Google accounts to a Hades user. The flow is:

// 2. The user completes the provider's consent screen.
// 3. OAuthCallback - exchange the code for a session token.
//
// A Hades account is created automatically on first OAuth login if no account
// with the provider identity exists. Subsequent logins link to the same account.

syntax = "proto3";

package hades.api.authentication.v1;

import "api/authentication/v1/auth.proto";
import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "gen/api/authentication/v1";

// OAuthProvider identifies a supported external identity provider.
enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_GITHUB = 1;
  OAUTH_PROVIDER_GOOGLE = 2;
}

// LinkedProvider records that a Hades account is connected to an external
// provider identity.
message LinkedProvider {
  // Which external provider is linked.
  OAuthProvider provider = 1;
  // When the link was established.
  google.protobuf.Timestamp linked_at = 2;
}

// GetOAuthURLRequest requests the authorization URL for the given provider.
message GetOAuthURLRequest {
  // The provider to authenticate with.
  OAuthProvider provider = 1;
  // PKCE / CSRF state value generated by the client. Must be stored and
  // verified when OAuthCallback is called.
  string state = 2 [(buf.validate.field).required = true];
}

// GetOAuthURLResponse carries the URL to redirect the user to.
message GetOAuthURLResponse {
  // Authorization URL. Redirect the user's browser to this address.
  string url = 1;
}

// OAuthCallbackRequest completes the OAuth flow by exchanging the provider code.
message OAuthCallbackRequest {
  // The provider that issued the code.
  OAuthProvider provider = 1;
  // Authorization code from the provider's redirect.
  string code = 2 [(buf.validate.field).required = true];
  // CSRF state value that must match the state issued in GetOAuthURL.
  string state = 3 [(buf.validate.field).required = true];
}

// OAuthCallbackResponse carries the session issued after a successful OAuth login.
message OAuthCallbackResponse {
  // Standard login response. pending_totp is set if the account has TOTP enabled.
  LoginResponse login = 1;
}

// ListLinkedProvidersRequest lists all external providers linked to the caller.
message ListLinkedProvidersRequest {}

// ListLinkedProvidersResponse carries the linked providers.
message ListLinkedProvidersResponse {
  repeated LinkedProvider providers = 1;
}

// UnlinkProviderRequest removes the link between the caller's account and a
// provider identity.
message UnlinkProviderRequest {
  // The provider to unlink.
  OAuthProvider provider = 1;
}

// UnlinkProviderResponse is empty.
message UnlinkProviderResponse {}

// OAuthService manages OAuth 2.0 provider integrations for Hades accounts.
//
// GetOAuthURL and OAuthCallback are reachable without a session because no
// session exists at the start of the flow. All other RPCs require authentication.
service OAuthService {
  // GetOAuthURL returns the provider's authorization URL for a new OAuth flow.
  rpc GetOAuthURL(GetOAuthURLRequest) returns (GetOAuthURLResponse);

  // OAuthCallback exchanges the provider code for a Hades session token.
  // Creates a new account automatically if this is the user's first OAuth login.
  rpc OAuthCallback(OAuthCallbackRequest) returns (OAuthCallbackResponse);

  // ListLinkedProviders returns all external providers linked to the caller.
  rpc ListLinkedProviders(ListLinkedProvidersRequest) returns (ListLinkedProvidersResponse);

  // UnlinkProvider removes the link to the given provider from the caller's account.
  // Returns FAILED_PRECONDITION if unlinking would leave the account with no
  // login method.
  rpc UnlinkProvider(UnlinkProviderRequest) returns (UnlinkProviderResponse);
}
