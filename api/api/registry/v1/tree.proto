// Repository tree API for the Hades schema registry.
//
// Exposes the directory structure and file content of module repositories
// stored in Gitaly. All operations read from the HEAD revision of the
// repository; historical tree browsing is not supported.

syntax = "proto3";

package hades.api.registry.v1;

import "buf/validate/validate.proto";

option go_package = "gen/api/registry/v1";

// FileEntryType distinguishes files from directories in a tree listing.
enum FileEntryType {
  FILE_ENTRY_TYPE_UNSPECIFIED = 0;
  // A regular file (blob).
  FILE_ENTRY_TYPE_FILE = 1;
  // A directory (tree).
  FILE_ENTRY_TYPE_DIR = 2;
}

// FileEntry is one item returned by ListModuleFiles.
message FileEntry {
  // Base name of the entry (no leading path component).
  string name = 1;
  // Full path from the repository root (e.g. "proto/foo/bar.proto").
  string path = 2;
  // Whether this entry is a file or directory.
  FileEntryType type = 3;
  // Git object ID of the blob or sub-tree.
  string oid = 4;
  // Raw git mode bits (e.g. 0100644 for regular files, 0040000 for trees).
  int32 mode = 5;
}

// ListModuleFilesRequest requests the depth-1 contents of a path inside a
// module repository.
message ListModuleFilesRequest {
  // Username of the module owner.
  string owner = 1 [(buf.validate.field).string.min_len = 1];
  // Module name (without the owner prefix).
  string module = 2 [(buf.validate.field).string.min_len = 1];
  // Directory to list. Empty string or "." means the repository root.
  string path = 3;
}

// ListModuleFilesResponse carries the entries at the requested path.
message ListModuleFilesResponse {
  repeated FileEntry entries = 1;
}

// GetFileContentRequest fetches the raw content of a single file.
message GetFileContentRequest {
  // Username of the module owner.
  string owner = 1 [(buf.validate.field).string.min_len = 1];
  // Module name (without the owner prefix).
  string module = 2 [(buf.validate.field).string.min_len = 1];
  // Full file path from the repository root.
  string path = 3 [(buf.validate.field).string.min_len = 1];
}

// GetFileContentResponse carries the raw content of the requested file.
message GetFileContentResponse {
  // Raw file bytes.
  bytes content = 1;
  // Total size of the file in bytes.
  int64 size = 2;
}

// TreeService exposes repository-tree operations for Hades modules.
//
// All reads are against the HEAD revision of the repository. To browse
// historical state, use the CommitService to find the commit and reconstruct
// the path manually.
service TreeService {
  // ListModuleFiles returns the depth-1 contents of a directory inside the
  // latest commit of a module repository.
  // Returns NOT_FOUND if the module or path does not exist.
  rpc ListModuleFiles(ListModuleFilesRequest) returns (ListModuleFilesResponse);

  // GetFileContent returns the raw content of a single file by its path.
  // Returns NOT_FOUND if the module or file path does not exist.
  rpc GetFileContent(GetFileContentRequest) returns (GetFileContentResponse);
}
