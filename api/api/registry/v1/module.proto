// Module management API for the Hades schema registry.
//
// A module is the primary unit of versioning in Hades. It maps to a Git
// repository in Gitaly and holds one or more .proto files. Each push creates
// a new commit record under the module.
//
// Note: EVisibility and EState are legacy aliases for ModuleVisibility and
// ModuleState defined in user.proto. New fields should use ModuleVisibility
// and ModuleState; these aliases remain to avoid breaking generated code.

syntax = "proto3";

package hades.api.registry.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "gen/api/registry/v1";

// EVisibility is a legacy alias for ModuleVisibility. Use ModuleVisibility
// in new definitions.
enum EVisibility {
  E_VISIBILITY_UNSPECIFIED = 0;
  E_VISIBILITY_PUBLIC = 1;
  E_VISIBILITY_PRIVATE = 2;
}

// EState is a legacy alias for ModuleState. Use ModuleState in new definitions.
enum EState {
  E_STATE_UNSPECIFIED = 0;
  E_STATE_ACTIVE = 1;
  E_STATE_DEPRECATED = 2;
}

// Module is the metadata record for a Hades schema repository.
message Module {
  // Unique module identifier (UUID).
  string id = 1;
  // When the module was created.
  google.protobuf.Timestamp create_time = 2;
  // When the module metadata was last updated.
  google.protobuf.Timestamp update_time = 3;
  // Fully qualified module name in the form "{owner}/{module}".
  // Unique across the registry.
  string name = 4;
  // UUID of the user or organization that owns this module.
  string owner_id = 5;
  // Whether the module is publicly readable or restricted to members.
  EVisibility visibility = 6;
  // Optional human-readable description.
  string description = 7;
  // Default branch name in the underlying Git repository.
  string default_branch = 8;
  // Lifecycle state: active or deprecated.
  EState state = 9;
  // Optional URL associated with the module (e.g. upstream project).
  string url = 10;
  // Default label used when a commit is pushed without an explicit label.
  string default_label_name = 11;
}

// ModuleRef is a lightweight reference to a module used in upload payloads.
message ModuleRef {
  // UUID of the module. Mutually exclusive with owner+module.
  string id = 1;
  // Owner username.
  string owner = 2;
  // Short module name (without the owner prefix).
  string module = 3;
}

// CreateModuleByNameRequest creates a new module owned by the authenticated user.
message CreateModuleByNameRequest {
  // Short module name. Must be unique within the owner's namespace.
  string name = 1 [(buf.validate.field).required = true];
  // Visibility for the new module. Defaults to PUBLIC when unspecified.
  EVisibility visibility = 2;
  // Optional human-readable description.
  string description = 3;
  // Default branch name. Defaults to "main" when empty.
  string default_branch = 4;
}

// CreateModuleByNameResponse carries the newly created module record.
message CreateModuleByNameResponse {
  Module module = 1;
}

// ListModulesRequest is the input for ModuleService.ListModules.
message ListModulesRequest {
  // Filter by owner username. When empty, all modules visible to the caller
  // are returned (public modules and private modules the caller can read).
  string owner = 1;
}

// ListModulesResponse is the output for ModuleService.ListModules.
message ListModulesResponse {
  repeated Module modules = 1;
}

// GetModuleRequest is the input for ModuleService.GetModule.
message GetModuleRequest {
  // Username of the module owner.
  string owner = 1 [(buf.validate.field).required = true];
  // Short module name (without the owner prefix).
  string name = 2 [(buf.validate.field).required = true];
}

// GetModuleResponse is the output for ModuleService.GetModule.
message GetModuleResponse {
  Module module = 1;
}

// ModuleService manages Protobuf schema modules (repositories).
//
// Module creation allocates both a metadata row in PostgreSQL and a Git
// repository in Gitaly. If the DB insert fails after the repository is
// created, the repository is cleaned up before the error is returned.
service ModuleService {
  // CreateModuleByName creates a new module owned by the authenticated user.
  // Returns ALREADY_EXISTS if the name is taken within the owner's namespace.
  rpc CreateModuleByName(CreateModuleByNameRequest) returns (CreateModuleByNameResponse);

  // ListModules returns modules matching the optional owner filter.
  // Private modules are included only when the caller has read access.
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);

  // GetModule returns the module identified by owner and short name.
  // Returns NOT_FOUND if the module is private and the caller lacks read access.
  rpc GetModule(GetModuleRequest) returns (GetModuleResponse);
}
