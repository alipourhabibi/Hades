global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Hades process - Prometheus exporter on host port 9090
  - job_name: hades
    static_configs:
      - targets: ["host.docker.internal:9090"]

  # OTel Collector self-reported metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
